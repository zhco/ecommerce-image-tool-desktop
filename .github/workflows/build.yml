name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "电商图片处理工具" --add-data "src;src" --icon=NONE main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 电商图片处理工具
          path: dist/电商图片处理工具.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "*.exe,*.zip"
          tag: v1.0.0
          name: "v1.0.0"
          body: "电商图片处理工具桌面版首次发布"
          allowUpdates: true
